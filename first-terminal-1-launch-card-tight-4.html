@media(max-width:600px){body{font-size:12px}.app{height:auto;min-height:100%;border-radius:0;overflow:visible}.top{height:48px;position:sticky;top:0;z-index:3;background:var(--bg)}.tab{padding:0 14px}.session{display:none}.stage{display:block;padding:0}.ghost{display:none}.card{padding:18px 14px;border-width:0;border-radius:0;width:100%;box-shadow:none}.heading{font-size:20px}.sub{line-height:1.55}.agents{grid-template-columns:1fr;margin-top:17px}.agent{min-height:0;padding:13px}.group{grid-template-columns:68px 1fr}.model{padding:6px 7px}.agent:not(.selected) .catalog{opacity:.65}.footer{align-items:flex-end}.remember{max-width:120px}.start{padding:11px 12px}.composer{display:none}}
