<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>First terminal 01 — launch card</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:hsl(212 13% 5%);--card:hsl(212 13% 8%);--float:hsl(212 10% 12%);--line:hsl(212 7% 21%);--line2:hsl(212 7% 28%);--ink:hsl(212 14% 95%);--muted:hsl(212 14% 78%);--faint:hsl(212 12% 62%);--cyan:hsl(190 70% 57%);--cyan-dim:hsl(190 32% 18%);--blue:hsl(228 90% 62%);--green:hsl(152 40% 58%);--mono:"IBM Plex Mono",ui-monospace,monospace;--sans:"Hanken Grotesk",system-ui,sans-serif}
*{box-sizing:border-box}html,body{height:100%;margin:0}body{background:var(--bg);color:var(--ink);font-family:var(--mono);font-size:14px}.app{height:100%;border:1px solid var(--line2);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}.top{height:54px;border-bottom:1px solid var(--line);display:flex;align-items:stretch}.tab{display:flex;align-items:center;gap:10px;padding:0 22px;border-right:1px solid var(--line);color:var(--muted)}.tab.active{color:var(--ink);box-shadow:inset 0 -3px var(--cyan)}.dot{width:8px;height:8px;border:2px solid var(--cyan);border-radius:50%}.active .dot{background:var(--green);border:0;box-shadow:0 0 8px var(--green)}.plus{margin-left:auto;width:54px;border-left:1px solid var(--line);display:grid;place-items:center;color:var(--faint);font-size:24px}.session{padding:0 22px;border-left:1px solid var(--line);display:flex;align-items:center;color:var(--muted);white-space:nowrap}.session b{color:var(--cyan);margin-right:8px}.stage{flex:1;position:relative;display:grid;place-items:center;padding:34px}.ghost{position:absolute;inset:0;background:radial-gradient(circle at 50% 45%,var(--cyan-dim),transparent 34%);opacity:.32}.card{z-index:1;width:min(780px,100%);background:var(--card);border:1px solid var(--line2);border-radius:14px;box-shadow:0 24px 80px hsl(212 13% 2%);padding:28px}.eyebrow{color:var(--cyan);font-size:11px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}.heading{font-family:var(--sans);font-size:25px;font-weight:600;letter-spacing:-.02em}.sub{color:var(--faint);font-size:12px;margin-top:7px}.agents{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:26px}.agent{appearance:none;text-align:left;color:inherit;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:16px;cursor:pointer;min-height:126px}.agent.selected{border-color:var(--cyan);box-shadow:inset 0 0 0 1px var(--cyan)}.agent-head{display:flex;align-items:center;gap:11px}.glyph{width:34px;height:34px;border:1px solid var(--line2);border-radius:8px;display:grid;place-items:center;color:var(--cyan);font-size:17px;font-weight:600}.agent strong{font-family:var(--sans);font-size:16px}.agent small{display:block;color:var(--faint);margin-top:2px;font-size:10px}.models{display:flex;gap:6px;margin-top:17px}.model{border:1px solid var(--line);border-radius:999px;padding:6px 9px;color:var(--faint);font-size:10px}.model.on{color:var(--ink);border-color:var(--line2);background:var(--float)}.agent:not(.selected) .models{opacity:.42}.footer{display:flex;align-items:center;gap:14px;margin-top:24px;padding-top:18px;border-top:1px solid var(--line)}.remember{color:var(--faint);font-size:11px;display:flex;gap:8px;align-items:center}.check{width:15px;height:15px;border:1px solid var(--line2);border-radius:3px;display:grid;place-items:center;color:var(--cyan);font-size:10px}.start{margin-left:auto;border:0;border-radius:9px;background:var(--blue);color:var(--bg);font:600 12px var(--mono);padding:11px 16px}.kbd{border:1px solid var(--line2);border-radius:4px;padding:1px 5px;margin-left:6px;color:var(--faint)}.note{text-align:center;color:var(--faint);font-size:10px;margin-top:15px}.composer{height:62px;margin:0 16px 12px;border:1px solid var(--line);border-radius:12px;display:flex;align-items:center;padding:0 18px;color:var(--faint)}
@media(max-width:600px){body{font-size:12px}.app{border-radius:0}.top{height:48px}.tab{padding:0 14px}.session{display:none}.stage{padding:12px;align-items:end}.ghost{display:none}.card{padding:20px 16px;border-radius:14px 14px 0 0;margin:-12px;width:calc(100% + 24px)}.heading{font-size:20px}.agents{grid-template-columns:1fr;margin-top:18px}.agent{min-height:104px;padding:14px}.agent:not(.selected){min-height:64px}.agent:not(.selected) .models{display:none}.footer{align-items:flex-end}.remember{max-width:130px}.start{padding:12px}.composer{display:none}}
</style>
</head><body><main class="app"><header class="top"><div class="tab active"><i class="dot"></i>Terminal 1</div><div class="plus">+</div><div class="session"><b>New coding session</b>with Maks</div></header><section class="stage"><div class="ghost"></div><div class="card"><div class="eyebrow">First lane</div><div class="heading">Who should start this session?</div><div class="sub">Pick an agent and its starting model. You can switch later from the mode row.</div><div class="agents"><button class="agent selected"><span class="agent-head"><span class="glyph">C</span><span><strong>Claude Code</strong><small>Anthropic · permission cards</small></span></span><span class="models"><span class="model on">Opus 4.8</span><span class="model">Sonnet 4.6</span><span class="model">Haiku 4.5</span></span></button><button class="agent"><span class="agent-head"><span class="glyph">›_</span><span><strong>Codex</strong><small>OpenAI · workspace sandbox</small></span></span><span class="models"><span class="model on">GPT-5.6 Terra</span><span class="model">Luna</span><span class="model">Sol</span></span></button></div><div class="footer"><span class="remember"><i class="check">✓</i>Use this next time</span><button class="start">Start Claude Code <span class="kbd">↵</span></button></div><div class="note">↑↓ choose · ←→ model · enter start</div></div></section><div class="composer">Message the agent…</div></main></body></html>
