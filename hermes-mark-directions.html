<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hermes mark directions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0d10;
      --panel: hsl(212 13% 8%);
      --line: hsl(212 7% 21%);
      --line-strong: hsl(212 7% 28%);
      --ink: hsl(212 14% 95%);
      --muted: hsl(212 14% 78%);
      --faint: hsl(212 12% 62%);
      --agent: hsl(201 78% 64%);
      --cobalt: #1a6ef4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 0%, color-mix(in oklab, var(--agent) 5%, transparent), transparent 34rem),
        var(--bg);
      color: var(--ink);
      font-family: "Hanken Grotesk", sans-serif;
    }
    .page { width: min(1376px, calc(100% - 64px)); margin: 0 auto; padding: 42px 0 36px; }
    header { display: flex; align-items: end; justify-content: space-between; gap: 32px; margin-bottom: 30px; }
    .eyebrow { margin: 0 0 8px; color: var(--agent); font: 500 12px/1 "IBM Plex Mono", monospace; letter-spacing: .15em; text-transform: uppercase; }
    h1 { margin: 0; font-size: clamp(32px, 3.2vw, 48px); line-height: 1; letter-spacing: -.035em; font-weight: 600; }
    .lede { max-width: 490px; margin: 0; color: var(--muted); font: 400 13px/1.6 "IBM Plex Mono", monospace; text-align: right; }
    .options { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 12px; }
    .option { position: relative; min-width: 0; }
    .option input { position: absolute; opacity: 0; pointer-events: none; }
    .card {
      display: flex;
      min-height: 650px;
      flex-direction: column;
      align-items: center;
      padding: 18px 12px 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, color-mix(in oklab, var(--panel) 92%, transparent), color-mix(in oklab, var(--bg) 96%, transparent));
      cursor: pointer;
      transition: border-color 140ms ease, background 140ms ease;
    }
    .card:hover { border-color: var(--line-strong); }
    input:checked + .card {
      border-color: color-mix(in oklab, var(--agent) 58%, var(--line));
      background: radial-gradient(circle at 50% 28%, color-mix(in oklab, var(--agent) 9%, transparent), transparent 38%), var(--panel);
      box-shadow: 0 0 30px color-mix(in oklab, var(--agent) 9%, transparent);
    }
    .number { align-self: stretch; color: var(--faint); font: 500 10px/1 "IBM Plex Mono", monospace; letter-spacing: .13em; }
    .picker-context { display: grid; flex: 1; place-items: center; width: 100%; padding: 18px 0 12px; }
    .agent { display: flex; flex-direction: column; align-items: center; text-align: center; }
    .tile {
      display: grid;
      width: 104px;
      height: 104px;
      place-items: center;
      border: 1px solid var(--line-strong);
      border-radius: 18px;
      color: var(--agent);
      box-shadow: 0 0 24px color-mix(in oklab, var(--agent) 18%, transparent), inset 0 0 16px color-mix(in oklab, var(--agent) 7%, transparent);
    }
    svg { width: 58px; height: 58px; overflow: visible; }
    .agent strong { margin-top: 12px; font-size: 23px; font-weight: 600; line-height: 1; }
    .agent small { margin-top: 7px; color: var(--faint); font: 400 9px/1 "IBM Plex Mono", monospace; letter-spacing: .015em; white-space: nowrap; }
    .copy { width: 100%; padding: 15px 4px 0; border-top: 1px solid color-mix(in oklab, var(--line) 80%, transparent); }
    .copy h2 { margin: 0 0 7px; font-size: 17px; line-height: 1.15; letter-spacing: -.015em; }
    .copy p { min-height: 64px; margin: 0; color: var(--muted); font: 400 11px/1.55 "IBM Plex Mono", monospace; }
    .verdict { display: inline-flex; margin-top: 13px; padding: 6px 8px; border-radius: 999px; color: var(--faint); background: color-mix(in oklab, var(--line) 38%, transparent); font: 500 9px/1 "IBM Plex Mono", monospace; letter-spacing: .06em; text-transform: uppercase; }
    input:checked + .card .verdict { color: var(--agent); background: color-mix(in oklab, var(--agent) 11%, transparent); }
    .footer { display: flex; align-items: center; justify-content: space-between; gap: 24px; margin-top: 18px; color: var(--faint); font: 400 10px/1.4 "IBM Plex Mono", monospace; }
    .key { display: flex; gap: 16px; }
    .key span::before { content: ""; display: inline-block; width: 6px; height: 6px; margin-right: 7px; border-radius: 50%; background: var(--agent); box-shadow: 0 0 9px var(--agent); }
    .key span:last-child::before { background: var(--cobalt); box-shadow: none; }
    @media (max-width: 900px) {
      .page { width: min(100% - 28px, 560px); padding: 24px 0 28px; }
      header { display: block; margin-bottom: 18px; }
      h1 { font-size: 30px; }
      .lede { margin-top: 12px; text-align: left; font-size: 11px; }
      .options { grid-template-columns: 1fr; gap: 9px; }
      .card { min-height: 132px; display: grid; grid-template-columns: 30px 96px minmax(0, 1fr); align-items: center; padding: 10px 12px; border-radius: 14px; }
      .number { align-self: center; }
      .picker-context { display: block; padding: 0; }
      .tile { width: 80px; height: 80px; border-radius: 15px; }
      svg { width: 48px; height: 48px; }
      .agent strong, .agent small { display: none; }
      .copy { padding: 0 0 0 10px; border: 0; }
      .copy h2 { font-size: 16px; }
      .copy p { min-height: 0; font-size: 10px; line-height: 1.42; }
      .verdict { margin-top: 8px; font-size: 8px; }
      .footer { margin-top: 13px; font-size: 9px; }
      .key { display: none; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div>
        <p class="eyebrow">Starting agent picker · mark study</p>
        <h1>Hermes, reduced to one signal.</h1>
      </div>
      <p class="lede">Five marks in the exact shipped picker tile. Glacier remains the agent color; only the glyph changes.</p>
    </header>

    <section class="options" aria-label="Five Hermes mark directions">
      <label class="option">
        <input type="radio" name="direction" checked>
        <span class="card">
          <span class="number">01</span>
          <span class="picker-context"><span class="agent"><span class="tile">
            <svg viewBox="0 0 64 64" fill="none" aria-hidden="true"><path d="M18 13v38M46 13v38M18 32h28" stroke="currentColor" stroke-width="6" stroke-linecap="round"/></svg>
          </span><strong>Hermes</strong><small>ACP · Nous Portal</small></span></span>
          <span class="copy"><h2>Bare H</h2><p>The clearest family match: one monoline glyph, no enclosure, legible even at tab size.</p><span class="verdict">Recommended</span></span>
        </span>
      </label>

      <label class="option">
        <input type="radio" name="direction">
        <span class="card">
          <span class="number">02</span>
          <span class="picker-context"><span class="agent"><span class="tile">
            <svg viewBox="0 0 64 64" fill="none" aria-hidden="true"><path d="M20 11v42M44 11v42M20 32h24" stroke="currentColor" stroke-width="5" stroke-linecap="square"/></svg>
          </span><strong>Hermes</strong><small>ACP · Nous Portal</small></span></span>
          <span class="copy"><h2>Technical H</h2><p>A narrower, squared terminal form. More system-like, less friendly, strongest at tiny sizes.</p><span class="verdict">Most compact</span></span>
        </span>
      </label>

      <label class="option">
        <input type="radio" name="direction">
        <span class="card">
          <span class="number">03</span>
          <span class="picker-context"><span class="agent"><span class="tile">
            <svg viewBox="0 0 64 64" fill="none" aria-hidden="true"><path d="M20 15v34M44 15v34M20 32h24" stroke="currentColor" stroke-width="5.5" stroke-linecap="round"/><path d="M13 18A25 25 0 0 1 51 18M51 46A25 25 0 0 1 13 46" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity=".58"/></svg>
          </span><strong>Hermes</strong><small>ACP · Nous Portal</small></span></span>
          <span class="copy"><h2>Open Halo</h2><p>Keeps the circle idea but breaks it away from the H, so the mark breathes and stops reading as circled text.</p><span class="verdict">Best circle</span></span>
        </span>
      </label>

      <label class="option">
        <input type="radio" name="direction">
        <span class="card">
          <span class="number">04</span>
          <span class="picker-context"><span class="agent"><span class="tile">
            <svg viewBox="0 0 64 64" fill="none" aria-hidden="true"><path d="M18 51V23a14 14 0 0 1 28 0v28M18 33h28" stroke="currentColor" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span><strong>Hermes</strong><small>ACP · Nous Portal</small></span></span>
          <span class="copy"><h2>Portal H</h2><p>The top becomes a doorway: a quiet nod to Nous Portal without adding a second badge around the letter.</p><span class="verdict">Most ownable</span></span>
        </span>
      </label>

      <label class="option">
        <input type="radio" name="direction">
        <span class="card">
          <span class="number">05</span>
          <span class="picker-context"><span class="agent"><span class="tile">
            <svg viewBox="0 0 64 64" fill="none" aria-hidden="true"><path d="M21 14v36M43 14v36M21 32h22" stroke="currentColor" stroke-width="5.5" stroke-linecap="round"/><path d="m15 22-7-5M49 22l7-5M15 42l-7 5M49 42l7 5" stroke="currentColor" stroke-width="3" stroke-linecap="round" opacity=".72"/></svg>
          </span><strong>Hermes</strong><small>ACP · Nous Portal</small></span></span>
          <span class="copy"><h2>Wing Tips</h2><p>Four small strokes hint at Hermes’ speed. Distinctive, though busier beside Claude and Codex.</p><span class="verdict">Most expressive</span></span>
        </span>
      </label>
    </section>

    <footer class="footer"><span>Tap a direction to compare its selected state.</span><span class="key"><span>Agent signal</span><span>Brand stays separate</span></span></footer>
  </main>
</body>
</html>
