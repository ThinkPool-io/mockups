<!doctype html>
<html lang="en" data-code-appearance="calm">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Calm Pool popup isolation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    :root {
      color-scheme: dark;
      --bg: #15171a;
      --surface: hsl(220 9% 15%);
      --float: hsl(220 8% 19%);
      --line: hsl(220 8% 25%);
      --line-strong: hsl(220 9% 33%);
      --ink: hsl(220 12% 96%);
      --ink-soft: hsl(220 10% 88%);
      --muted: hsl(220 9% 76%);
      --faint: hsl(220 8% 60%);
      --glacier: hsl(201 76% 69%);
      --glacier-hi: hsl(201 80% 76%);
      --danger: hsl(4 58% 65%);
      --panel-10: hsl(220 9% 15%);
      --panel-12: hsl(220 8% 18%);
      --font-sans: "Hanken Grotesk", system-ui, sans-serif;
      --font-mono: "IBM Plex Mono", ui-monospace, monospace;
    }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--ink); font-family: var(--font-sans); }
    button { font: inherit; }
    .room { min-height: 100vh; overflow: hidden; background: var(--bg); }
    .rail { height: 52px; display: flex; align-items: center; gap: 18px; border-bottom: 1px solid var(--line); padding: 0 18px; font-family: var(--font-mono); color: var(--muted); }
    .rail .active { color: var(--ink); border-bottom: 3px solid var(--glacier); height: 52px; display: flex; align-items: center; }
    .transcript { max-width: 860px; padding: 28px 32px; font-size: 18px; line-height: 1.6; color: var(--muted); opacity: .58; }
    .transcript p { margin: 0 0 18px; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; background: var(--glacier); box-shadow: 0 0 10px var(--glacier); }
    .tp-menu {
      position: absolute; top: 66px; right: 18px; width: 330px; max-width: calc(100vw - 24px); padding: 6px;
      border: 1px solid color-mix(in oklab, var(--line-strong) 72%, transparent);
      border-radius: 14px;
      background: color-mix(in oklab, var(--panel-12) 78%, var(--panel-10));
      color: var(--ink-soft);
      box-shadow: 0 1px 0 color-mix(in oklab, var(--ink) 5%, transparent) inset,
        0 28px 72px -28px color-mix(in oklab, var(--bg) 88%, transparent),
        0 10px 28px -18px color-mix(in oklab, var(--glacier) 20%, transparent);
    }
    .tp-menu-item, .tp-code-menu-row {
      display: flex; align-items: center; gap: 10px; width: calc(100% - 4px); margin-inline: 2px;
      min-height: 40px; border: 0; border-radius: 8px; padding: 8px 10px; background: transparent;
      color: var(--ink-soft); text-align: left;
    }
    .tp-menu-item { cursor: pointer; }
    .tp-menu-item:hover { background: color-mix(in oklab, var(--float) 78%, hsl(201 24% 18%)); color: var(--ink); }
    .menu-icon { display: grid; width: 18px; flex: none; place-items: center; color: var(--faint); font-family: var(--font-mono); }
    .label { min-width: 0; flex: 1; }
    .tp-menu-item.danger { color: var(--danger); }
    .tp-menu-divider { height: 1px; margin: 6px 2px; background: color-mix(in oklab, var(--line) 76%, transparent); }
    .segment, .stepper { display: inline-flex; height: 30px; overflow: hidden; border: 1px solid var(--line-strong); background: color-mix(in oklab, var(--bg) 30%, transparent); }
    .segment { border-radius: 999px; }
    .stepper { border-radius: 8px; }
    .segment span, .stepper span { display: grid; min-width: 52px; place-items: center; padding-inline: 9px; border-left: 1px solid var(--line); font: 500 11px var(--font-mono); color: var(--faint); }
    .segment span:first-child, .stepper span:first-child { border-left: 0; }
    .segment .on { background: color-mix(in oklab, var(--glacier) 14%, var(--float)); color: var(--glacier-hi); }
    .switch { width: 42px; height: 24px; border-radius: 999px; padding: 3px; border: 1px solid color-mix(in oklab, var(--glacier) 58%, var(--line)); background: color-mix(in oklab, var(--glacier) 12%, var(--surface)); }
    .switch::after { content: ""; display: block; width: 16px; height: 16px; margin-left: 18px; border-radius: 50%; background: var(--glacier); box-shadow: 0 0 10px color-mix(in oklab, var(--glacier) 45%, transparent); }
    @keyframes calm-think { 0%, 100% { opacity: .16; } 50% { opacity: 1; } }
    .composer {
      position: absolute; left: 50%; bottom: 26px; width: min(560px, calc(100vw - 48px)); height: 64px; transform: translateX(-50%);
      display: flex; align-items: center; gap: 12px; padding: 10px 12px; border: 1px solid hsl(201 76% 69% / .24); border-radius: 13px;
      background: hsl(220 9% 12%); color: var(--faint); font: 500 16px var(--font-mono);
    }
    .composer::after {
      content: ""; position: absolute; inset: -1px; border-radius: inherit; pointer-events: none;
      box-shadow: 0 0 13px hsl(201 76% 69% / .11); animation: calm-think 3.4s ease-in-out infinite;
    }
    .composer .plus { color: var(--faint); font-size: 23px; }
    .composer .placeholder { flex: 1; }
    .composer .action { display: grid; width: 42px; height: 42px; place-items: center; border: 1px solid color-mix(in oklab, var(--glacier) 55%, var(--line)); border-radius: 10px; color: var(--glacier); }
    .readout {
      position: absolute; left: 20px; bottom: 20px; min-width: 390px; padding: 16px 20px; border: 1px solid var(--line-strong); border-radius: 12px;
      background: rgba(255,255,255,.06); color: white; font: 16px/1.5 ui-monospace, "SF Mono", monospace; font-variant-numeric: tabular-nums;
    }
    .readout b { color: var(--glacier-hi); }
    @media (max-width: 639px) {
      .rail { padding: 0 12px; font-size: 12px; gap: 12px; }
      .transcript { padding: 24px 20px; font-size: 16px; }
      .tp-menu { top: 64px; right: 12px; width: 354px; }
      .tp-menu-item, .tp-code-menu-row { min-height: 44px; }
      .composer { bottom: 112px; width: calc(100vw - 24px); height: 62px; }
      .readout { left: 12px; right: 12px; bottom: 12px; min-width: 0; padding: 12px 14px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <main class="room">
    <div class="rail"><span>Terminal autoname</span><span class="active">Calm Pool</span><span>＋</span><span>◉</span></div>
    <div class="transcript">
      <p><span class="dot"></span>Calm Pool keeps the room quiet while the agent thread stays visible.</p>
      <p>User turns remain green and pearl. Popup actions use warm graphite surfaces and Glacier focus.</p>
    </div>
    <section class="tp-menu" aria-label="Session options">
      <button class="tp-menu-item"><span class="menu-icon">ⓘ</span><span class="label">Session info</span></button>
      <button class="tp-menu-item"><span class="menu-icon">▣</span><span class="label">Copy terminal transcript</span></button>
      <div class="tp-code-menu-row"><span class="menu-icon">◐</span><span class="label">Theme</span><span class="segment"><span>NEON</span><span class="on">CALM</span></span></div>
      <div class="tp-code-menu-row"><span class="menu-icon">Aₐ</span><span class="label">Text size</span><span class="stepper"><span>−</span><span>100%</span><span>+</span></span></div>
      <div class="tp-code-menu-row"><span class="menu-icon">↕</span><span class="label">Compact tool rows</span><span class="switch"></span></div>
      <button class="tp-menu-item"><span class="menu-icon">◯</span><span class="label">Feedback</span></button>
      <button class="tp-menu-item"><span class="menu-icon">?</span><span class="label">Guide</span></button>
      <div class="tp-menu-divider"></div>
      <button class="tp-menu-item danger"><span class="menu-icon">↪</span><span class="label">Leave room</span></button>
    </section>
    <div class="composer" aria-label="Active-turn composer preview">
      <span class="plus">＋</span><span class="placeholder">Message agent…</span><span class="action">ϟ</span>
    </div>
    <div class="readout" id="readout">Measuring after fonts load…</div>
  </main>
  <script>
    document.fonts.ready.then(() => {
      const rows = [...document.querySelectorAll('.tp-menu-item,.tp-code-menu-row')]
      const firstLabel = document.querySelector('.tp-menu-item .label')
      const heights = rows.map(row => Math.round(row.getBoundingClientRect().height))
      const panel = document.querySelector('.tp-menu').getBoundingClientRect()
      const labelColor = getComputedStyle(firstLabel).color
      document.getElementById('readout').innerHTML =
        `<b>✓ ${innerWidth < 640 ? 'mobile' : 'desktop'}</b> · panel ${Math.round(panel.width)}×${Math.round(panel.height)}px<br>` +
        `rows ${Math.min(...heights)}–${Math.max(...heights)}px · label ${labelColor}<br>` +
        `target ${innerWidth < 640 ? '44' : '40'}px · no icon-color leakage`
    })
  </script>
</body>
</html>
