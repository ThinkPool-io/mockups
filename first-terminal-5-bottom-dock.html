<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>First terminal 05 — launch dock</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:hsl(212 13% 5%);--card:hsl(212 13% 8%);--float:hsl(212 10% 12%);--line:hsl(212 7% 21%);--line2:hsl(212 7% 28%);--ink:hsl(212 14% 95%);--muted:hsl(212 14% 78%);--faint:hsl(212 12% 62%);--cyan:hsl(190 70% 57%);--blue:hsl(228 90% 62%);--green:hsl(152 40% 58%);--mono:"IBM Plex Mono",monospace;--sans:"Hanken Grotesk",sans-serif}*{box-sizing:border-box}html,body{height:100%;margin:0}body{background:var(--bg);color:var(--ink);font-family:var(--mono)}.app{height:100%;border:1px solid var(--line2);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}.top{height:54px;border-bottom:1px solid var(--line);display:flex}.tab{display:flex;align-items:center;gap:10px;padding:0 22px;box-shadow:inset 0 -3px var(--cyan)}.dot{width:8px;height:8px;border:2px solid var(--cyan);border-radius:50%}.plus{margin-left:auto;width:54px;border-left:1px solid var(--line);display:grid;place-items:center;color:var(--faint);font-size:24px}.session{padding:0 22px;border-left:1px solid var(--line);display:flex;align-items:center;color:var(--muted);font-size:13px}.session b{color:var(--cyan);margin-right:8px}.stage{flex:1;display:flex;flex-direction:column;min-height:0}.empty{flex:1;padding:40px 32px}.brand{font-size:16px;font-weight:600}.brand span{color:var(--cyan)}.meta{color:var(--faint);font-size:11px;margin-top:7px}.rule{height:1px;background:var(--line);margin-top:24px}.dock{margin:0 18px 16px;background:var(--card);border:1px solid var(--line2);border-radius:13px;padding:18px;display:grid;grid-template-columns:auto 1fr auto;gap:18px;align-items:center}.intro{padding-right:18px;border-right:1px solid var(--line)}.intro b{display:block;font:600 15px var(--sans)}.intro small{color:var(--faint);font-size:9px;display:block;margin-top:4px}.controls{display:grid;grid-template-columns:180px 1fr;gap:8px}.select{height:46px;border:1px solid var(--line2);border-radius:8px;background:var(--bg);display:flex;align-items:center;padding:0 12px;gap:9px;font-size:11px}.select .glyph{color:var(--cyan);font-size:15px}.select .chev{margin-left:auto;color:var(--faint)}.models{display:flex;gap:6px}.model{flex:1;min-width:86px;border:1px solid var(--line);border-radius:8px;display:flex;flex-direction:column;justify-content:center;padding:0 10px;color:var(--faint);font-size:10px}.model b{color:var(--ink);font-size:11px}.model.on{border-color:var(--cyan);background:var(--float)}.start{width:92px;height:46px;border:0;border-radius:8px;background:var(--blue);color:var(--bg);font:600 11px var(--mono)}.after{text-align:center;color:var(--faint);font-size:9px;margin-top:8px}.after span{color:var(--muted)}
@media(max-width:760px){.app{border-radius:0}.top{height:48px}.tab{padding:0 14px;font-size:12px}.session{display:none}.empty{padding:28px 18px}.dock{margin:0;border-width:1px 0 0;border-radius:14px 14px 0 0;padding:18px 14px;display:block}.intro{border:0;padding:0 0 14px}.controls{grid-template-columns:1fr}.models{overflow-x:auto;padding-bottom:3px}.model{height:48px;min-width:100px}.start{width:100%;margin-top:10px;height:48px}.after{margin:10px 0 3px}}
</style></head><body><main class="app"><header class="top"><div class="tab"><i class="dot"></i>Terminal 1</div><div class="plus">+</div><div class="session"><b>New coding session</b>with Maks</div></header><section class="stage"><div class="empty"><div class="brand">thinkpool <span>code</span></div><div class="meta">The room is ready. Choose the first lane below.</div><div class="rule"></div></div><div class="dock"><div class="intro"><b>Open Terminal 1</b><small>agent + starting model</small></div><div><div class="controls"><div class="select"><span class="glyph">C</span><span>Claude Code</span><span class="chev">⌄</span></div><div class="models"><div class="model on"><b>Opus 4.8</b>most capable</div><div class="model"><b>Sonnet 4.6</b>balanced</div><div class="model"><b>Haiku 4.5</b>fast</div></div></div><div class="after">Switch later from the mode row · <span>remember this choice</span></div></div><button class="start">Start ↵</button></div></section></main></body></html>
