<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ThinkPool — User action gradient sweeps · 5-up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;600;700&amp;family=IBM+Plex+Mono:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<style>
  :root{
    --page:hsl(212 13% 5%);--term:hsl(200 36% 2%);--card:hsl(200 26% 5%);--surf:hsl(199 20% 11%);
    --line:hsl(199 24% 17%);--line-strong:hsl(194 30% 26%);--ink:hsl(190 26% 96%);
    --ink-soft:hsl(190 22% 88%);--muted:hsl(192 16% 76%);--faint:hsl(196 16% 60%);
    --viewer:hsl(150 60% 60%);--partner:hsl(210 10% 72%);--pool:hsl(220 95% 55%);--agent:hsl(190 70% 57%);
    --ok:hsl(150 66% 56%);--sans:"Hanken Grotesk",system-ui,sans-serif;--mono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:var(--page);color:var(--ink);font-family:var(--sans)}
  body{display:grid;place-items:center;padding:24px}
  .page{width:min(1396px,100%)}
  header{display:flex;align-items:flex-end;gap:24px;margin-bottom:18px;padding:2px 2px 16px;border-bottom:1px solid var(--line)}
  .title{flex:1;min-width:0}.eyebrow{font:600 10px/1.2 var(--mono);letter-spacing:.15em;text-transform:uppercase;color:var(--faint)}
  h1{margin:7px 0 3px;font:600 29px/1.08 var(--sans);letter-spacing:-.025em}.sub{margin:0;color:var(--muted);font-size:13px}
  .legend{display:flex;flex-wrap:wrap;gap:8px 14px;justify-content:flex-end;font:500 10px/1.2 var(--mono);color:var(--faint)}
  .role{display:flex;align-items:center;gap:6px}.dot{width:7px;height:7px;border-radius:50%;background:var(--c);box-shadow:0 0 8px color-mix(in oklab,var(--c) 55%,transparent)}
  .grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:11px}
  .option{overflow:hidden;min-width:0;border:1px solid var(--line);border-radius:10px;background:var(--card)}
  .option-head{display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:7px;align-items:center;min-height:44px;padding:8px 10px;border-bottom:1px solid var(--line);background:color-mix(in oklab,var(--surf) 42%,transparent)}
  .num{font:600 9px/1 var(--mono);letter-spacing:.1em;color:var(--faint)}.name{font-weight:700;font-size:13px;color:var(--ink)}
  .metric{font:600 8px/1.3 var(--mono);text-align:right;color:var(--faint)}
  .terminal{padding:10px 10px 11px;background:var(--term);font-size:12px;line-height:1.5}
  .agentline{margin:0 0 8px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .agentmark{display:inline-block;width:7px;height:7px;margin-right:6px;border-radius:50%;background:var(--agent);box-shadow:0 0 7px color-mix(in oklab,var(--agent) 70%,transparent)}
  .user-row{--u:var(--viewer);position:relative;margin:0 -10px 5px;padding:6px 10px 6px 26px;text-indent:-16px;word-break:break-word;box-shadow:inset 2px 0 0 var(--u)}
  .user-row.partner{--u:var(--partner)}
  .drop{display:inline-flex;width:16px;height:1.5em;align-items:center;vertical-align:top;color:var(--u);text-indent:0}.drop svg{width:11px;height:11px;overflow:visible}
  .speaker{color:var(--u);font:600 12px/1.5 var(--mono);margin-right:4px;text-indent:0}.route{font:600 12px/1.5 var(--mono);margin-right:4px;text-indent:0}
  .route.pool{color:var(--pool)}.route.agent{color:var(--agent)}.body{color:var(--ink-soft)}.clock{color:var(--faint);font:500 8px/1 var(--mono);margin-left:4px;letter-spacing:.08em;text-indent:0}
  .answer{margin-top:1px}.answered{color:var(--ok);font-weight:700}.choice{color:var(--ink-soft)}
  .tool{display:grid;grid-template-columns:auto auto minmax(0,1fr) auto;gap:6px;align-items:center;margin-top:7px;padding:7px 8px;border:1px solid var(--line-strong);border-radius:7px;background:var(--card);font:500 9px/1.2 var(--mono)}
  .tooltri,.toolname{color:var(--agent);font-weight:600}.toolcmd{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted)}.check{color:var(--ok)}

  .v1 .user-row{background:linear-gradient(90deg,color-mix(in oklab,var(--u) 22%,transparent) 0%,color-mix(in oklab,var(--u) 9%,transparent) 20%,transparent 56%)}
  .v2 .user-row{background:linear-gradient(90deg,color-mix(in oklab,var(--u) 20%,transparent) 0%,color-mix(in oklab,var(--u) 10%,transparent) 34%,color-mix(in oklab,var(--u) 4%,transparent) 65%,transparent 88%)}
  .v3 .user-row{background:linear-gradient(90deg,color-mix(in oklab,var(--u) 15%,transparent) 0%,color-mix(in oklab,var(--u) 9%,transparent) 40%,color-mix(in oklab,var(--u) 5%,transparent) 72%,transparent 100%)}
  .v4 .user-row{background:linear-gradient(90deg,color-mix(in oklab,var(--u) 8%,transparent) 0%,color-mix(in oklab,var(--u) 20%,transparent) 14%,color-mix(in oklab,var(--u) 10%,transparent) 34%,color-mix(in oklab,var(--u) 3%,transparent) 70%,transparent 96%)}
  .v5 .user-row{background:linear-gradient(90deg,color-mix(in oklab,var(--u) 17%,transparent) 0%,color-mix(in oklab,var(--u) 13%,transparent) 16%,color-mix(in oklab,var(--u) 8%,transparent) 42%,color-mix(in oklab,var(--u) 4%,transparent) 72%,transparent 100%)}

  @media(max-width:1080px){.grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
  @media(max-width:680px){body{display:block;padding:14px 10px}header{align-items:flex-start;flex-direction:column;gap:10px;margin-bottom:13px}.legend{justify-content:flex-start}.grid{grid-template-columns:1fr;gap:10px}.option-head{min-height:44px}.terminal{font-size:12.5px}.speaker,.route{font-size:12.5px}}
</style>
</head>
<body>
<main class="page">
  <header>
    <div class="title"><div class="eyebrow">ThinkPool Code · gradient sweep study</div><h1>User action rows — five gradient directions</h1><p class="sub">Same live terminal geometry and role colors. Only the horizontal fade shape changes across chat, routed actions, and answered records.</p></div>
    <div class="legend"><span class="role"><i class="dot" style="--c:var(--viewer)"></i>viewer · green</span><span class="role"><i class="dot" style="--c:var(--partner)"></i>non-viewer · silver</span><span class="role"><i class="dot" style="--c:var(--pool)"></i>Pool · cobalt</span><span class="role"><i class="dot" style="--c:var(--agent)"></i>agent · cyan</span></div>
  </header>
  <section class="grid" id="grid" aria-label="Five gradient sweep variations"></section>
</main>
<template id="option-template">
  <article class="option">
    <div class="option-head"><span class="num"></span><span class="name"></span><span class="metric"></span></div>
    <div class="terminal">
      <p class="agentline"><span class="agentmark"></span>The route is ready for the final call.</p>
      <div class="user-row viewer"><span class="drop" aria-hidden="true"><svg viewBox="0 0 16 16" fill="none"><path d="M8 1.7C8 1.7 3 7 3 10.1A5 5 0 0 0 13 10.1C13 7 8 1.7 8 1.7Z" stroke="currentColor" stroke-width="1.6"/></svg></span><span class="speaker">Maks</span><span class="route pool">@pool</span><span class="body">ship the desktop and mobile pass</span><span class="clock">20:38</span></div>
      <div class="user-row partner"><span class="drop" aria-hidden="true"><svg viewBox="0 0 16 16" fill="none"><path d="M8 1.7C8 1.7 3 7 3 10.1A5 5 0 0 0 13 10.1C13 7 8 1.7 8 1.7Z" stroke="currentColor" stroke-width="1.6"/></svg></span><span class="speaker">Conrad</span><span class="route agent">@agent</span><span class="body">check the live route before we call it done</span><span class="clock">20:39</span></div>
      <div class="user-row viewer answer"><span class="drop" aria-hidden="true"><svg viewBox="0 0 16 16" fill="none"><path d="M8 1.7C8 1.7 3 7 3 10.1A5 5 0 0 0 13 10.1C13 7 8 1.7 8 1.7Z" stroke="currentColor" stroke-width="1.6"/></svg></span><span class="speaker">Maks</span><span class="answered">answered</span><span class="choice"> · Ship it</span><span class="clock">20:40</span></div>
      <div class="tool"><span class="tooltri">▶</span><span class="toolname">Bash</span><span class="toolcmd">npm run build</span><span class="check">✓</span></div>
    </div>
  </article>
</template>
<script>
  const options=[
    ['01','Tight edge','fade 56%','v1'],['02','Balanced fade','fade 88%','v2'],['03','Long ambient','fade 100%','v3'],
    ['04','Center peak','peak 14%','v4'],['05','Feathered tide','5 stops','v5']
  ];
  const grid=document.getElementById('grid'),tpl=document.getElementById('option-template');
  for(const [num,name,metric,cls] of options){const node=tpl.content.cloneNode(true);node.querySelector('.option').classList.add(cls);node.querySelector('.num').textContent=num;node.querySelector('.name').textContent=name;node.querySelector('.metric').textContent=metric;grid.appendChild(node)}
</script>
</body>
</html>
