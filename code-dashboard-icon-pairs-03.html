<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard icon pair 3 — Handoff + inset</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=Newsreader:opsz,wght@6..72,400&display=swap" rel="stylesheet">
  <style>
    :root{--bg:hsl(212 13% 5%);--raised:hsl(212 11% 8%);--surface:hsl(212 10% 10%);--float:hsl(212 9% 13%);--line:hsl(212 7% 21%);--line2:hsl(212 7% 28%);--ink:hsl(212 14% 95%);--muted:hsl(212 14% 78%);--faint:hsl(212 12% 62%);--pool:hsl(217 85% 62%);--pool-hi:hsl(217 85% 70%);--ok:hsl(152 32% 60%);--agent:hsl(190 74% 54%)}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink)}body{font:500 14px "Hanken Grotesk",system-ui,sans-serif}button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
.shell{min-height:100vh}
.nav{height:64px;border-bottom:1px solid color-mix(in oklab,var(--line) 70%,transparent);background:color-mix(in oklab,var(--bg) 86%,transparent);display:flex;align-items:center}
.nav-inner{width:min(1024px,calc(100% - 32px));height:100%;margin:auto;display:flex;align-items:center}
.logo{font-size:26px;line-height:1;font-weight:500;letter-spacing:-1.1px}
.logo span{color:#1A6EF4}
.nav-actions{margin-left:auto;display:flex;gap:4px}
.nav-btn{width:40px;height:40px;border-radius:8px;color:var(--muted);display:grid;place-items:center}
.nav-btn svg{width:19px;height:19px}
.main{width:min(976px,calc(100% - 32px));margin:auto;padding:24px 0 60px}
.title{font:500 26px/1.1 "Newsreader",serif;letter-spacing:-.02em;margin:0}
.lede{margin:8px 0 0;color:var(--muted);font-size:14px;line-height:1.55}
.bridge{margin-top:20px;border:1px solid color-mix(in oklab,var(--ok) 35%,transparent);border-radius:10px;background:color-mix(in oklab,var(--surface) 50%,transparent)}
.bridge-row{min-height:66px;padding:12px 16px;display:flex;align-items:center;gap:12px}
.bridge-main{min-width:0;min-height:44px;flex:1;display:flex;align-items:center;gap:12px;text-align:left}
.icon-tile{display:grid;place-items:center;flex:0 0 auto;color:var(--pool-hi)}
.bridge-tile{width:40px;height:40px;border:1px solid var(--line2);border-radius:5px;background:hsl(212 16% 6%)}
.session-tile{width:36px;height:36px;border-radius:5px;background:color-mix(in oklab,var(--pool) 12%,var(--raised))}
.glyph{width:23px;height:23px;fill:none;stroke:currentColor;stroke-width:1.45;stroke-linecap:round;stroke-linejoin:round}
.session-tile .glyph{width:21px;height:21px;stroke-width:1.55}
.bridge-copy{display:block;min-width:0;flex:1}
.bridge-title{display:flex;align-items:center;gap:8px;font-size:14px}
.bridge-title strong{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.online{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 7px var(--ok)}
.meta{display:block;margin-top:4px;color:var(--faint);font:500 11px "IBM Plex Mono",monospace;white-space:nowrap}
.meta .managed{color:var(--ok)}
.providers{height:36px;border:1px solid var(--line2);border-radius:8px;padding:0 8px 0 10px;display:flex;align-items:center;gap:7px;color:var(--muted);font-size:12px}
.providers .badge{border-radius:5px;background:color-mix(in oklab,var(--pool) 15%,transparent);padding:2px 6px;color:var(--pool-hi);font:500 10px "IBM Plex Mono",monospace}
.more{width:36px;height:36px;border:1px solid var(--line2);border-radius:8px;color:var(--muted);font-size:18px;letter-spacing:2px}
.sessions{margin-top:28px}
.eyebrow{color:var(--faint);font:600 12px "IBM Plex Mono",monospace;letter-spacing:.16em;text-transform:uppercase;margin-bottom:10px}
.session-list{display:grid;gap:10px}
.new-card,.session-card{min-height:66px;border-radius:10px;display:flex;align-items:center;gap:12px}
.new-card{width:100%;border:1px dashed color-mix(in oklab,var(--pool) 45%,transparent);background:color-mix(in oklab,var(--surface) 50%,transparent);padding:14px 20px;text-align:left}
.new-tile{width:36px;height:36px;border:1px solid color-mix(in oklab,var(--pool) 45%,transparent);border-radius:5px;background:color-mix(in oklab,var(--pool) 10%,transparent);display:grid;place-items:center;color:var(--pool-hi);font:500 20px/1 "IBM Plex Mono",monospace}
.session-card{border:1px solid color-mix(in oklab,var(--ok) 30%,transparent);background:color-mix(in oklab,var(--surface) 50%,transparent);padding-right:12px}
.session-open{min-width:0;flex:1;display:flex;align-items:center;gap:12px;padding:14px 12px 14px 20px}
.copy{min-width:0;flex:1}
.name-line{display:flex;min-width:0;align-items:baseline;gap:8px}
.name{font-size:14.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hosted{flex:0 0 auto;color:var(--faint);font:500 11px "IBM Plex Mono",monospace}
.hosted b{color:var(--pool-hi);font-weight:500}
.helper,.code{margin-top:2px;color:var(--faint);font:500 11px/1.5 "IBM Plex Mono",monospace}
.code b{color:var(--pool-hi);font-weight:500}
.status{margin-top:6px;display:flex;align-items:center;gap:12px;font:600 10px "IBM Plex Mono",monospace}
.live{color:var(--ok)}
.live:before{content:"";display:inline-block;width:6px;height:6px;border-radius:1px;background:var(--ok);box-shadow:0 0 6px var(--ok);margin-right:6px}
.person{color:var(--muted)}
.person:before{content:"";display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--faint);margin-right:6px}
.working{color:var(--agent)}
.working:before{content:"";display:inline-block;width:8px;height:8px;border:1px solid var(--agent);border-radius:50%;margin-right:6px}
.card-menu{width:36px;height:36px;border:1px solid var(--line2);border-radius:8px;color:var(--muted);font-size:18px}
.concept{position:fixed;left:15px;bottom:12px;color:color-mix(in oklab,var(--faint) 65%,transparent);font:600 10px "IBM Plex Mono",monospace;letter-spacing:.12em;text-transform:uppercase}
    @media(max-width:640px){.nav{height:68px}
.nav-inner{width:calc(100% - 20px)}
.main{width:calc(100% - 32px);padding-top:24px}
.bridge-row{gap:10px;padding:12px}
.bridge-tile{width:40px;height:40px}
.providers{width:36px;padding:0;justify-content:center}
.providers .label{display:none}
.providers .badge{display:none}
.more{width:36px}
.session-open{padding-left:14px}
.new-card{padding-left:14px}
.name-line{display:block}
.hosted{display:block;margin-top:2px}
.status{gap:10px;flex-wrap:wrap}
.concept{display:none}}
  </style>
</head>
<body class="pair-3">
  <svg width="0" height="0" aria-hidden="true" style="position:absolute">
    <defs>
      <symbol id="bridge-1" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/><path d="M6.5 12h11"/></symbol>
      <symbol id="session-1" viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="2"/></symbol>
      <symbol id="bridge-2" viewBox="0 0 24 24"><path d="M5 16v-2a7 7 0 0 1 14 0v2"/><circle cx="5" cy="17.5" r="1"/><circle cx="19" cy="17.5" r="1"/></symbol>
      <symbol id="session-2" viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="2"/><circle cx="12" cy="12" r="1.5"/></symbol>
      <symbol id="bridge-3" viewBox="0 0 24 24"><path d="M4 9h6l4 6h6"/><circle cx="4" cy="9" r="1"/><circle cx="20" cy="15" r="1"/></symbol>
      <symbol id="session-3" viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="2"/><rect x="9" y="9" width="6" height="6" rx="1"/></symbol>
      <symbol id="bridge-4" viewBox="0 0 24 24"><path d="M8 5H5v14h3M16 5h3v14h-3M8 12h8"/></symbol>
      <symbol id="session-4" viewBox="0 0 24 24"><path d="M8 5H5v3M16 5h3v3M19 16v3h-3M8 19H5v-3"/><circle cx="12" cy="12" r="1.5"/></symbol>
      <symbol id="bridge-5" viewBox="0 0 24 24"><circle cx="5" cy="15" r="1.5"/><circle cx="19" cy="9" r="1.5"/><path d="M6.5 15c4 0 7-6 11-6"/></symbol>
      <symbol id="session-5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"/><path d="M12 19v-5"/></symbol>
      <symbol id="bridge-6" viewBox="0 0 24 24"><circle cx="9" cy="12" r="4"/><circle cx="15" cy="12" r="4"/></symbol>
      <symbol id="session-6" viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="2"/><path d="M12 5v14"/></symbol>
      <symbol id="bridge-7" viewBox="0 0 24 24"><path d="M4 9h6M14 9h6M4 15h6M14 15h6"/></symbol>
      <symbol id="session-7" viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="2"/><path d="M5 9h14"/></symbol>
      <symbol id="bridge-8" viewBox="0 0 24 24"><path d="M12 12 6 6M12 12l6-6M12 12v7"/><circle cx="6" cy="6" r="1"/><circle cx="18" cy="6" r="1"/><circle cx="12" cy="19" r="1"/></symbol>
      <symbol id="session-8" viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="2"/><path d="M12 5v14M5 12h14"/></symbol>
      <symbol id="bridge-9" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><path d="M6 12h3l2-3 2 6 2-3h3"/></symbol>
      <symbol id="session-9" viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"/></symbol>
      <symbol id="bridge-10" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="19" cy="12" r="1.4"/><path d="M6.5 12h4M13.5 12h4"/></symbol>
      <symbol id="session-10" viewBox="0 0 24 24"><path d="M5 10V5h5M14 5h5v5M19 14v5h-5M10 19H5v-5"/></symbol>
    </defs>
  </svg>
  <div class="shell">
    <nav class="nav"><div class="nav-inner"><div class="logo">think<span>pool</span></div><div class="nav-actions"><button class="nav-btn" aria-label="Contacts"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M16 20v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 10a4 4 0 1 0 0-8 4 4 0 0 0 0 8M22 20v-2a4 4 0 0 0-3-3.87"/></svg></button><button class="nav-btn" aria-label="Settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 2 3.5 7v10L12 22l8.5-5V7z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div></nav>
    <main class="main">
      <h1 class="title">Code sessions</h1><p class="lede">Pair on a coding agent, live — one project, many terminals, two people.</p>
      <section class="bridge"><div class="bridge-row"><button class="bridge-main" aria-label="Bridge details"><span class="icon-tile bridge-tile"><svg class="glyph"><use href="#bridge-3"/></svg></span><span class="bridge-copy"><span class="bridge-title"><strong>Maxs-MacBook-Pro-3</strong><i class="online"></i></span><span class="meta">v0.7.294 · 6 sessions · <span class="managed">managed</span></span></span></button><button class="providers"><span aria-hidden="true">▱</span><span class="label">Providers</span><span class="badge">4</span></button><button class="more" aria-label="Bridge actions">•••</button></div></section>
      <section class="sessions"><div class="eyebrow">Your code sessions</div><div class="session-list">
        <button class="new-card"><span class="new-tile">+</span><span class="copy"><span class="name-line"><span class="name">Start a code session</span><span class="hosted">hosted by <b>you</b></span></span><span class="helper">Open a room, invite your partner…</span></span></button>
        <article class="session-card"><button class="session-open"><span class="icon-tile session-tile"><svg class="glyph"><use href="#session-3"/></svg></span><span class="copy"><span class="name-line"><span class="name">Conrad live room</span><span class="hosted">hosted by <b>you</b></span></span><span class="code"><b>M2579Q</b> · just now</span><span class="status"><span class="live">LIVE</span><span class="person">Conrad</span><span class="working">agent working</span></span></span></button><button class="card-menu" aria-label="Session actions">⋮</button></article>
        <article class="session-card"><button class="session-open"><span class="icon-tile session-tile"><svg class="glyph"><use href="#session-3"/></svg></span><span class="copy"><span class="name-line"><span class="name">ThinkPool dashboard</span><span class="hosted">hosted by <b>you</b></span></span><span class="code"><b>8TMX54</b> · 4m ago</span><span class="status"><span class="live">LIVE</span><span class="person">Maks</span></span></span></button><button class="card-menu" aria-label="Session actions">⋮</button></article>
      </div></section>
    </main>
    <div class="concept">3 · Handoff + inset</div>
  </div>
</body>
</html>
